- name: Arrow Right
  code: arrow-right
  html_template: |
    <div class="shape-arrow-right">
      {{var label.title}}
    </div>
  style: |
    .shape-arrow-right {
      --bg: #F28550;
      background: var(--bg);
      padding: 5px 10px;
      position: relative;
      height: 30px;
      border-radius: 2px 0 0 2px;
      box-sizing: border-box;
      white-space: nowrap;
      display: inline-block;
      width: fit-content;
    }
    .shape-arrow-right:after {
      content: "";
      position: absolute;
      right: -15px;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: 15px solid var(--bg);
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
    }
- name: Flag Right
  code: flag-right
  html_template: |
    <div class="shape-flag-right">
      {{var label.title}}
    </div>
  style: |
    .shape-flag-right {
      --bg: #F28550;
      background: var(--bg);
      padding: 5px 10px;
      position: relative;
      height: 30px;
      border-radius: 2px 0 0 2px;
