  style: |
    .shape-badge {
      position: relative;
    }
    .shape-badge__content {
      left: 10px;
      position: absolute;
      text-align: center;
      top: 10px;
      color: #fff;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
- name: Price Tag
  code: price-tag
  html_template: |
    <div class="shape-price-tag">
      <span>{{var label.title}}</span>
    </div>
  style: |
    .shape-price-tag {
      display: inline-block;
      z-index: 5;
      width: auto;
      height: 38px;
      background-color: green;
      border-radius: 3px 4px 4px 3px;
      margin-left: 19px;
      position: relative;
      color: white;
      line-height: 38px;
      padding: 0 10px 0 10px;
      font-weight: 600;
      transform: rotate(30deg);
    }
    .shape-price-tag:before {
      content: "";
      position: absolute;
      display: block;
      top: 4px;
      left: -14px;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border-bottom-left-radius: 8px;
      background: green;
      transform: rotate(45deg);
      z-index: 1;
    }
    .shape-price-tag:after {
      content: "";
      background-color: white;
      border-radius: 50%;
      width: 8px;
      height: 8px;
      display: block;
      position: absolute;
      left: -9px;
      top: 15px;
      z-index: 2;
    }
    .shape-price-tag span {
      z-index: 10;
      position: relative;
      white-space: nowrap;
    }
- name: Simple
  code: simple
  html_template: |
    <div class="shape-simple">
      {{var label.title}}
    </div>
  style: |
    .shape-simple {
      background: #A04E49;
      color: #fff;
      padding: 5px 10px;
      border-radius:2px;
      white-space: nowrap;
      display: inline-block;
      width: fit-content;
    }
