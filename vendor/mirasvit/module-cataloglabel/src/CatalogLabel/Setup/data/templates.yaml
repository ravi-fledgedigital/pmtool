      right: -15px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 15px solid var(--bg);
      border-right: 15px solid transparent;
    }
    .shape-flag-right:before {
      content: "";
      position: absolute;
      right: -15px;
      bottom: 0;
      width: 0;
      height: 0;
      border-bottom: 15px solid var(--bg);
      border-right: 15px solid transparent;
    }
- name: Circle
  code: circle
  html_template: |
    <div class="shape-circle">
      <div class="shape-circle__content">{{var label.title}}</div>
    </div>
  style: |
    .shape-circle {
      background-color: #F2A718;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items:center;
      justify-content:center;
      font-weight: bold;
    }
    .shape-circle__content {
      max-width: 50px;
      display: flex;
      align-items:center;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 50px;
      white-space: nowrap;
    }
- name: Circle 2 (dynamic)
  code: circle-2
  html_template: |
    <div class="shape-circle-2">
      <div>{{var label.title}}</div>
    </div>
  style: |
    .shape-circle-2 {
      padding: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      max-width: 100px;
      width: fit-content;
    }
    .shape-circle-2:before {
      content: "";
      display: block;
      width: 100%;
      height: 0;
      padding-bottom: 100%;
      background: #4679BD;
      border-radius: 50%;
      position: absolute;
    }
    .shape-circle-2 div {
      float: left;
      text-align: center;
      color: white;
      white-space: wrap;
      max-width: 100px;
      max-height: 100px;
      text-overflow: ellipsis;
      z-index: 10;
    }
- name: Corner TopLeft
  code: corner-topleft
  html_template: |
    <div class="shape-corner">
      <div class="shape-corner__content">{{var label.title}}</div>
    </div>
  style: |
    .shape-corner {
      position: relative;
      width: 0;
      height: 0;
      border-top: 100px solid #F2A718;
      border-right: 100px solid transparent;
    }
    .shape-corner__content {
      width: 90px;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      height: 25px;
      white-space: nowrap;
      top: -74px;
      position: relative;
      transform: rotate(-45deg);
    }

