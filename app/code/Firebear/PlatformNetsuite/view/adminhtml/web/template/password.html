<div class="admin__field" data-bind="css: $data.additionalClasses, attr: {'data-index': index}, visible: visible">
    <div class="admin__field-label">
        <label
                class="admin__form-field-label"
                data-bind="attr: {for: uid}
            ">
            <span translate="label"></span>
        </label>
    </div>
    <div class="admin__field-control">
        <input class="admin__control-text" type="password" data-bind="
            hasFocus: focused,
            value: value,
            attr: {
                name: inputName,
                placeholder: placeholder,
                'aria-describedby': getDescriptionId(),
                'aria-required': required,
                'aria-invalid': error() ? true : 'false',
                id: uid,
                disabled: disabled,
                maxlength: 255
            }"/>
        <label class="admin__field-error" if="error" attr="for: uid" text="error"/>
    </div>
</div>
