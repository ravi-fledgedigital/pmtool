<!-- ko if: isDisplayed() -->
<tr class="totals discount">
    <th class="mark" scope="row">
        <span class="title" data-bind="i18n: 'Order Discount'"></span>
        <span class="discount coupon" data-bind="text: getCouponCode()"></span>
    </th>
    <td class="amount">
        <span class="price" data-bind="text: getValue(), attr: {'data-th': 'Order Discount'}"></span>
    </td>
</tr>
<!-- /ko -->
<!-- ko ifnot: isDisplayed() -->

        <span class="title" data-bind="i18n: 'Order Discount'"></span>

</tr>
