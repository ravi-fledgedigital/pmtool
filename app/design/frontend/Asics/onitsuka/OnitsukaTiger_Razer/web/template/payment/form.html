<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>

    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <form method="POST" action="../seamless" id="mpprod_seamless" role="molpayseamless">
            <table style="border:none;padding: 2px" data-bind="foreach:
            getActiveChannels()">
                <tr>
                    <td width="5%"><input type="radio" name="payment_options"
                                          data-bind="value: value" required/></td>
                    <td  data-bind="text: label"></td>
                </tr>
            </table>

            <input type="hidden" name="cart_id" data-bind="value : getCurrentCartId()" />
            <input type="hidden" name="current_email" data-bind="value : getCurrentCustomerEmail()" />
            <input type="hidden" name="billingAddress" id="billingAddress"/>
            <input type="hidden" name="addressExtension" id="addressExtension"/>
        </form>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary"
                        type="button"
                        data-bind="
        click: placeOrderValidate,
        attr: {title: $t('Place Order')},
        enable: (getCode() == isChecked())
        ">
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
                <button style="display:none;" class="action primary checkout"
                        type="button"
                        data-bind="
        click: placeOrder,
        attr: {title: $t('Place Order')},
        css: {disabled: !isPlaceOrderActionAllowed()},
        enable: (getCode() == isChecked())
        ">
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
<div id="counter"></div>
</div>
